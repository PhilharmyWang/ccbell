# config.example.yaml — ccbell 示例配置
# 本文件为示例，真实配置请复制为 config.yaml（已被 .gitignore 忽略）
# cp config.example.yaml config.yaml
# 然后填入你的真实值
#
# ntfy.sh 公共服务的 topic 是明文的，任何人知道 topic 就能发/收。
# 请使用随机难猜字符串（例如 ccbell-xxx-yyy-32chars），或使用自建/付费实例。

device:
  name: laptop            # 显示在通知标题中
  group: local            # 分组：local / cluster / cloud

backends:
  - name: bark
    enabled: true
    server: "https://api.day.app"
    key: "YOUR_BARK_KEY"  # 替换为你的 Bark 设备密钥
    sound: "bell"
    level_map:
      info: active
      warning: timeSensitive
      error: timeSensitive

  # - name: ntfy
  #   enabled: true
  #   server: "https://ntfy.sh"
  #   topic: "ccbell-REPLACE-with-unique-string"
  #   tags: "bell,robot"
  #   priority_map:
  #     info: 3
  #     warning: 4
  #     error: 5

enrichers: []             # Step 4 填充

filters:
  min_duration_seconds: 0 # Step 5 启用

summary:
  max_length: 200
  truncate_suffix: "..."
